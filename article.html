<!DOCTYPE html>
<html>
<head>
    <title>Article - CEM Hub</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <main>
        <div id="article">Loading...</div>
        <section id="comments-section" class="hidden"></section>
    </main>

    <script type="module">
    import { supabase } from './js/supabase.js'
    import { initLayout } from './js/layout.js'

    const user = await initLayout()
    const articleDiv = document.getElementById('article')
    const commentsSection = document.getElementById('comments-section')
    const urlParams = new URLSearchParams(window.location.search)
    const articleId = urlParams.get('id')

    if (!articleId) {
        articleDiv.innerHTML = '<p>Article not found</p>'
    } else {
        await loadArticle()
    }

    async function loadArticle() {
        const { data: article, error } = await supabase
        .from('articles')
        .select('*')
        .eq('id', articleId)
        .single()

        if (error || !article) {
            articleDiv.innerHTML = '<p>Error loading article</p>'
            return
        }

        // Get likes + comments count
        const { data: likes } = await supabase
        .from('likes')
        .select('user_id')
        .eq('article_id', articleId)

        const { data: comments } = await supabase
        .from('comments')
        .select('id')
        .eq('article_id', articleId)

        const likeCount = likes?.length || 0
        const commentCount = comments?.length || 0
        const isLiked = user && likes?.some(l => l.user_id === user.id)
        const shareUrl = window.location.href

        articleDiv.innerHTML = `
            ${article.cover_image_url? `
                <div class="article-hero">
                    <img src="${article.cover_image_url}" alt="${article.title}">
                </div>
            ` : ''}
            
            <article class="article-full">
                ${article.category? `<span class="category-badge">${article.category}</span>` : ''}
                <h1>${article.title}</h1>
                ${article.excerpt? `<p class="article-excerpt">${article.excerpt}</p>` : ''}
                <div class="meta">
                    By <a href="profile.html?user=${article.author_id}">${article.author_name || article.author_email}</a> • 
                    Posted ${new Date(article.created_at).toLocaleDateString()}
                    ${user && user.id === article.author_id? `
                        • <a href="post-article.html?edit=${article.id}">Edit</a>
                        • <button class="link-btn deleteBtn" data-id="${article.id}">Delete</button>
                    ` : ''}
                </div>

                <div class="article-content-full">
                    ${article.content}
                </div>
            </article>
        `

        commentsSection.innerHTML = `
            <div class="article-actions">
                <button class="action-btn likeBtn ${isLiked? 'liked' : ''}" data-id="${article.id}">
                    ${isLiked? '❤️' : '🤍'} ${likeCount}
                </button>
                <span class="action-btn static">💬 ${commentCount}</span>
                
                <div class="share-group">
                    <button class="share-btn" id="copyLinkBtn">🔗 Copy Link</button>
                    <a class="share-btn" target="_blank" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">Facebook</a>
                    <a class="share-btn" target="_blank" href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(article.title)}">X</a>
                    <a class="share-btn" target="_blank" href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}">LinkedIn</a>
                </div>
            </div>

            <h3>Comments</h3>
            <div id="comments">Loading comments...</div>
            
            <div id="commentForm" class="${user? '' : 'hidden'}">
                <h4>Add a comment</h4>
                <textarea id="commentText" placeholder="Write your comment..."></textarea>
                <button id="postCommentBtn">Post Comment</button>
                <div id="commentMsg"></div>
            </div>
        `
        commentsSection.classList.remove('hidden')
        await loadComments()

        // Event listeners
        document.querySelector('.likeBtn')?.addEventListener('click', handleLike)
        document.querySelector('.deleteBtn')?.addEventListener('click', handleDelete)
        document.getElementById('copyLinkBtn')?.addEventListener('click', copyLink)
        document.getElementById('postCommentBtn')?.addEventListener('click', postComment)
    }

    async function handleLike(e) {
        if (!user) return alert('Log in to like articles')
        const btn = e.target.closest('button')
        const isLiked = btn.classList.contains('liked')
        
        const { error } = isLiked 
        ? await supabase.from('likes').delete().eq('user_id', user.id).eq('article_id', articleId)
          : await supabase.from('likes').insert({ user_id: user.id, article_id: articleId })
        
        if (!error) await loadArticle()
    }

    async function handleDelete() {
        if (!confirm('Delete this article?')) return
        const { error } = await supabase.from('articles').delete().eq('id', articleId)
        if (!error) window.location.href = 'blog.html'
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href)
        const btn = document.getElementById('copyLinkBtn')
        btn.textContent = '✓ Copied!'
        setTimeout(() => btn.textContent = '🔗 Copy Link', 2000)
    }

    async function loadComments() {
        const { data: comments } = await supabase
        .from('comments')
        .select('*')
        .eq('article_id', articleId)
        .order('created_at', { ascending: true })

        const commentsDiv = document.getElementById('comments')
        if (!comments || comments.length === 0) {
            commentsDiv.innerHTML = '<p>No comments yet. Be the first!</p>'
            return
        }

        commentsDiv.innerHTML = comments.map(comment => `
            <div class="comment">
                <div class="comment-meta">
                    <strong>${comment.author_name || comment.author_email}</strong> • 
                    ${new Date(comment.created_at).toLocaleDateString()}
                </div>
                <p>${comment.content}</p>
            </div>
        `).join('')
    }

    async function postComment() {
        const content = document.getElementById('commentText').value
        const msg = document.getElementById('commentMsg')
        if (!content) return msg.textContent = 'Comment cannot be empty'

        const { error } = await supabase.from('comments').insert({
            article_id: articleId,
            content,
            user_id: user.id,
            author_email: user.email,
            author_name: user.user_metadata?.full_name || user.email.split('@')[0]
        })

        if (error) msg.textContent = `Error: ${error.message}`
        else {
            msg.textContent = 'Posted!'
            document.getElementById('commentText').value = ''
            await loadArticle() // Reloads counts
            await loadComments()
            setTimeout(() => msg.textContent = '', 2000)
        }
    }
    </script>
</body>
    </html>
