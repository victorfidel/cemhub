<!DOCTYPE html>
<html>
<head>
    <title>Article - CEM Hub</title>
</head>
<body>
    <div id="debug" style="background:#ffeeee;padding:20px;font-family:monospace;"></div>
    <main id="articleContent">Loading...</main>
    
    <script type="module">
        const debug = document.getElementById('debug')
        
        try {
            debug.innerHTML += '1. Script started<br>'
            
            const { supabase } = await import('./js/supabase.js')
            debug.innerHTML += '2. Supabase imported<br>'
            
            const { initLayout } = await import('./js/layout.js')
            debug.innerHTML += '3. Layout imported<br>'
            
            const user = await initLayout()
            debug.innerHTML += '4. initLayout ran. User: ' + (user?.email || 'none') + '<br>'
            
            const params = new URLSearchParams(window.location.search)
            const articleId = params.get('id')
            debug.innerHTML += '5. Article ID: ' + articleId + '<br>'
            
            if (!articleId) {
                document.getElementById('articleContent').innerHTML = 'No article ID in URL'
            } else {
                const { data, error } = await supabase.from('articles').select('*').eq('id', articleId).single()
                if (error) throw error
                document.getElementById('articleContent').innerHTML = `<h1>${data.title}</h1><p>${data.content}</p>`
                debug.innerHTML += '6. Article loaded<br>'
            }
            
        } catch (err) {
            debug.innerHTML += `<br><b>ERROR:</b> ${err.message}<br>`
            debug.innerHTML += `<b>Stack:</b> ${err.stack}`
        }
    </script>
</body>
</html>
