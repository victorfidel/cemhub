<!DOCTYPE html>
<html>
<head>
    <title>Article - CEM Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <main id="articleContent">
        <p>Loading article...</p>
    </main>
    
    <script type="module">
        import { supabase } from './js/supabase.js'
        import { initLayout } from './js/layout.js'
        
        const user = await initLayout()
        
        const params = new URLSearchParams(window.location.search)
        const articleId = params.get('id')
        const articleContent = document.getElementById('articleContent')
        
        if (!articleId) {
            articleContent.innerHTML = '<h1>Error</h1><p>No article ID provided in URL.</p>'
        } else {
            const { data, error } = await supabase
                .from('articles')
                .select('*')
                .eq('id', articleId)
                .single()
            
            if (error) {
                articleContent.innerHTML = `<h1>Error</h1><p>Could not load article: ${error.message}</p>`
            } else {
                document.title = `${data.title} - CEM Hub`
                articleContent.innerHTML = `
                    <article>
                        <h1>${data.title}</h1>
                        <div class="article-meta">
                            <small>Published: ${new Date(data.created_at).toLocaleDateString()}</small>
                        </div>
                        <div class="article-body">
                            ${data.content}
                        </div>
                    </article>
                `
            }
        }
    </script>
</body>
</html>
