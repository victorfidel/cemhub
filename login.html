<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CEM Hub</title>
    <style>
        /* CEM Hub Branding */
        :root {
          --primary: #0A2A5E;
          --primary-dark: #061A3C;
          --accent: #C9A227;
          --accent-dark: #A68520;
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #1e293b;
          --text-muted: #64748b;
          --border: #e2e8f0;
          --radius: 8px;
          --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
          font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 1rem;
        }

        .auth-container {
          background: var(--card);
          border-radius: var(--radius);
          box-shadow: var(--shadow);
          width: 100%;
          max-width: 420px;
          padding: 2.5rem 2rem;
          border-top: 4px solid var(--accent);
        }

        .logo {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 0.5rem;
          font-size: 1.5rem;
          font-weight: 700;
          color: var(--primary);
          margin-bottom: 2rem;
          text-decoration: none;
        }

        .logo-icon {
          width: 32px;
          height: 32px;
          background: var(--accent);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          color: var(--primary);
          font-weight: 800;
          font-size: 0.9rem;
        }

        h1 { 
          font-size: 1.75rem;
          text-align: center;
          margin-bottom: 1.5rem;
          color: var(--primary);
        }

        .form-group {
          margin-bottom: 1rem;
        }

        label {
          display: block;
          font-size: 0.875rem;
          font-weight: 600;
          color: var(--text);
          margin-bottom: 0.25rem;
        }

        input, select { 
          width: 100%; 
          padding: 0.75rem; 
          border: 1px solid var(--border);
          border-radius: var(--radius);
          font-family: inherit;
          font-size: 1rem;
          transition: all 0.2s;
        }

        input:focus, select:focus {
          outline: none;
          border-color: var(--accent);
          box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.1);
        }

        button { 
          width: 100%; 
          padding: 0.875rem; 
          border: none;
          border-radius: var(--radius);
          cursor: pointer; 
          font-weight: 600;
          font-size: 1rem;
          transition: all 0.2s;
          margin-top: 0.5rem;
        }

        #submitBtn { 
          background: var(--primary); 
          color: white; 
        }

        #submitBtn:hover:not(:disabled) { 
          background: var(--primary-dark); 
        }

        #submitBtn:disabled {
          opacity: 0.6;
          cursor: not-allowed;
        }

        .toggle { 
          background: transparent; 
          color: var(--primary);
          border: 1px solid var(--border);
        }

        .toggle:hover { 
          background: var(--bg);
          border-color: var(--accent);
        }

        #msg { 
          margin-top: 1rem; 
          padding: 0.75rem;
          border-radius: var(--radius);
          font-size: 0.875rem;
          text-align: center;
          display: none;
        }

        #msg.error {
          background: #fef2f2;
          color: #dc2626;
          display: block;
        }

        #msg.success {
          background: #f0fdf4;
          color: #16a34a;
          display: block;
        }

        .signup-only {
          display: none;
        }

        body.signup-mode .signup-only {
          display: block;
        }

        .divider {
          text-align: center;
          margin: 1.5rem 0 1rem 0;
          color: var(--text-muted);
          font-size: 0.875rem;
          position: relative;
        }

        .divider::before, .divider::after {
          content: '';
          position: absolute;
          top: 50%;
          width: 45%;
          height: 1px;
          background: var(--border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="/" class="logo">
            <div class="logo-icon">CEM</div>
            Hub
        </a>
        
        <h1 id="title">Login</h1>
        
        <form id="authForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group signup-only">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe">
            </div>

            <div class="form-group signup-only">
                <label for="nationality">Nationality</label>
                <input type="text" id="nationality" placeholder="Nigerian">
            </div>

            <div class="form-group signup-only">
                <label for="state">State of Residence</label>
                <input type="text" id="state" placeholder="Lagos">
            </div>

            <div class="form-group signup-only">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob">
            </div>
            
            <button type="submit" id="submitBtn">Login</button>
            
            <div id="msg"></div>

            <div class="divider">or</div>
            
            <button type="button" class="toggle" id="toggleBtn">Need an account? Sign Up</button>
        </form>
    </div>
    
    <script type="module" src="./js/auth.js"></script>
</body>
    </html>
