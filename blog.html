<!DOCTYPE html>
<html>
<head>
    <title>CEM Hub</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <main>
        <div id="postForm" class="hidden">
            <h2>New Post</h2>
            <input type="text" id="title" placeholder="Article title">
            <textarea id="content" placeholder="Write your article..."></textarea>
            <button id="publishBtn">Publish Article</button>
            <div id="msg"></div>
        </div>

        <h1>Latest Articles</h1>
        <div id="articles">Loading...</div>
    </main>

    <script type="module">
    import { supabase } from './js/supabase.js'
    import { initLayout } from './js/layout.js'

    const user = await initLayout()
    const postForm = document.getElementById('postForm')
    const articlesDiv = document.getElementById('articles')

    // Show errors on page so you can see them on phone
    function showError(msg) {
        articlesDiv.innerHTML = `<div style="color:red; padding:20px; border:1px solid red; background:#ffeeee;">
            <strong>Error:</strong> ${msg}
        </div>`
    }

    if (user) {
        postForm.classList.remove('hidden')
    }

    async function loadArticles() {
    try {
        const { data: articles, error: articlesError } = await supabase
         .from('articles')
         .select('*')
         .order('created_at', { ascending: false })

        if (articlesError) {
            showError(`Articles table: ${articlesError.message}`)
            return
        }
        
        if (!articles || articles.length === 0) {
            articlesDiv.innerHTML = '<p>No articles yet.</p>'
            return
        }

        // Fetch likes
        const { data: likes, error: likesError } = await supabase
         .from('likes')
         .select('article_id, user_id')
        
        if (likesError) {
            showError(`Likes error: ${likesError.message}`)
            return
        }

        // Fetch comment counts
        const { data: comments, error: commentsError } = await supabase
         .from('comments')
         .select('article_id')

        if (commentsError) {
            showError(`Comments error: ${commentsError.message}`)
            return
        }

        const userLikes = user && likes ? likes.filter(l => l.user_id === user.id).map(l => l.article_id) : []
        
        const articlesWithCounts = articles.map(article => {
            const likeCount = likes?.filter(l => l.article_id === article.id).length || 0
            const commentCount = comments?.filter(c => c.article_id === article.id).length || 0
            const isLiked = userLikes.includes(article.id)
            return { ...article, likeCount, commentCount, isLiked }
        })

        renderArticles(articlesWithCounts)
    } catch (err) {
        showError(`Unexpected: ${err.message}`)
    }
    }
    
    function renderArticles(articles) {
        articlesDiv.innerHTML = articles.map(article => `
            <article class="article" data-id="${article.id}">
                <h3><a href="article.html?id=${article.id}">${article.title}</a></h3>
                <div class="meta">
                    By <a href="profile.html?user=${article.author_id}">${article.author_name || article.author_email || 'Anonymous'}</a> • 
                    Posted ${new Date(article.created_at).toLocaleDateString()}
                </div>
                <p>${article.content.substring(0, 150)}...</p>
                <div class="actions">
                    <button class="action-btn likeBtn ${article.isLiked? 'liked' : ''}" data-id="${article.id}">
                        ${article.isLiked? '❤️' : '🤍'} ${article.likeCount}
                    </button>
                    <a class="action-btn" href="article.html?id=${article.id}#comments">💬 ${article.commentCount}</a>
                    ${user && user.id === article.author_id? `
                        <a class="action-btn" href="post-article.html?edit=${article.id}">
                            ✏️ Edit
                        </a>
                        <button class="action-btn delete-btn deleteBtn" data-id="${article.id}">
                            🗑️ Delete
                        </button>
                    ` : ''}
                </div>
            </article>
        `).join('')
    }

    await loadArticles()

    // Handle clicks
    articlesDiv.addEventListener('click', async (e) => {
        const btn = e.target.closest('button')
        if (!btn) return
        const id = btn.dataset.id
        if (!id) return

        if (btn.classList.contains('deleteBtn')) {
            if (!confirm('Delete this article?')) return
            const { error } = await supabase.from('articles').delete().eq('id', id)
            if (error) alert(`Error: ${error.message}`)
            else await loadArticles()
        }

        if (btn.classList.contains('likeBtn')) {
            if (!user) {
                alert('Log in to like articles')
                return
            }

            const isLiked = btn.classList.contains('liked')
            const { error } = isLiked 
             ? await supabase.from('likes').delete().eq('user_id', user.id).eq('article_id', id)
              : await supabase.from('likes').insert({ user_id: user.id, article_id: id })
            
            if (error) alert(`Like error: ${error.message}`)
            else await loadArticles()
        }
    })

    // Publish
    document.getElementById('publishBtn')?.addEventListener('click', async () => {
        const title = document.getElementById('title').value
        const content = document.getElementById('content').value
        const msg = document.getElementById('msg')

        if (!title ||!content) {
            msg.textContent = 'Title and content required'
            return
        }

        const { error } = await supabase.from('articles').insert({
            title,
            content,
            user_id: user.id,
            author_id: user.id,
            author_email: user.email,
            author_name: user.user_metadata?.full_name || user.email.split('@')[0]
        })

        if (error) {
            msg.textContent = `Error: ${error.message}`
        } else {
            msg.textContent = 'Published!'
            document.getElementById('title').value = ''
            document.getElementById('content').value = ''
            await loadArticles()
        }
    })
</script>
</body>
</html>
