<!DOCTYPE html>
<html>
<head>
    <title>CEM Hub</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <main>
        <div id="postForm" class="hidden">
            <h2>New Post</h2>
            <input type="text" id="title" placeholder="Article title">
            <textarea id="content" placeholder="Write your article..."></textarea>
            <button id="publishBtn">Publish Article</button>
            <div id="msg"></div>
        </div>

        <h1>Latest Articles</h1>
        <div id="articles">Loading...</div>
    </main>

    <script type="module">
        import { supabase } from './js/supabase.js'
        import { initLayout } from './js/layout.js'

        const user = await initLayout()
        const postForm = document.getElementById('postForm')
        const articlesDiv = document.getElementById('articles')

        if (user) {
            postForm.classList.remove('hidden')
        }

        async function loadArticles() {
            // Get articles + like counts + comment counts + check if current user liked
            const { data: articles, error } = await supabase
             .from('articles')
             .select(`
                *,
                likes(count),
                likes!inner(user_id),
                comments(count)
             `)
             .order('created_at', { ascending: false })

            if (error) {
                // Fallback if the join fails due to RLS
                const { data: fallbackArticles } = await supabase
                  .from('articles')
                  .select('*')
                  .order('created_at', { ascending: false })
                
                renderArticles(fallbackArticles, error)
                return
            }
            renderArticles(articles)
        }

        async function renderArticles(articles, error = null) {
            if (error) {
                articlesDiv.innerHTML = `<p>Error loading articles: ${error.message}</p>`
                return
            } 
            if (articles.length === 0) {
                articlesDiv.innerHTML = '<p>No articles yet.</p>'
                return
            }

            // Get all likes by current user to check "liked" state
            let userLikes = []
            if (user) {
                const { data } = await supabase
                  .from('likes')
                  .select('article_id')
                  .eq('user_id', user.id)
                userLikes = data?.map(l => l.article_id) || []
            }

            articlesDiv.innerHTML = articles.map(article => {
                const likeCount = article.likes?.[0]?.count || 0
                const commentCount = article.comments?.[0]?.count || 0
                const isLiked = userLikes.includes(article.id)

                return `
                <article class="article" data-id="${article.id}">
                    <h3><a href="article.html?id=${article.id}">${article.title}</a></h3>
                    <div class="meta">
                        By <a href="profile.html?user=${article.author_id}">${article.author_name || article.author_email || 'Anonymous'}</a> • 
                        Posted ${new Date(article.created_at).toLocaleDateString()}
                    </div>
                    <p>${article.content.substring(0, 150)}...</p>
                    <div class="actions">
                        <button class="likeBtn ${isLiked ? 'liked' : ''}" data-id="${article.id}">
                            ${isLiked ? '❤️' : '🤍'} ${likeCount}
                        </button>
                        <a href="article.html?id=${article.id}#comments">💬 ${commentCount}</a>
                        ${user && user.id === article.user_id? `
                            <button class="editBtn" data-id="${article.id}">Edit</button>
                            <button class="deleteBtn" data-id="${article.id}">Delete</button>
                        ` : ''}
                    </div>
                </article>
            `}).join('')
        }

        await loadArticles()

        // Handle clicks
        articlesDiv.addEventListener('click', async (e) => {
            const id = e.target.closest('[data-id]')?.dataset.id
            if (!id) return

            // DELETE
            if (e.target.classList.contains('deleteBtn')) {
                if (!confirm('Delete this article? This cannot be undone.')) return
                const { error } = await supabase.from('articles').delete().eq('id', id)
                if (error) alert(`Error: ${error.message}`)
                else await loadArticles()
            }

            // EDIT
            if (e.target.classList.contains('editBtn')) {
                window.location.href = `edit.html?id=${id}`
            }

            // LIKE / UNLIKE
            if (e.target.classList.contains('likeBtn')) {
                if (!user) {
                    alert('Log in to like articles')
                    return
                }

                const isLiked = e.target.classList.contains('liked')
                
                if (isLiked) {
                    await supabase.from('likes').delete()
                      .eq('user_id', user.id)
                      .eq('article_id', id)
                } else {
                    await supabase.from('likes').insert({
                        user_id: user.id,
                        article_id: id
                    })
                }
                await loadArticles()
            }
        })

        // Publish new article
        document.getElementById('publishBtn')?.addEventListener('click', async () => {
            const title = document.getElementById('title').value
            const content = document.getElementById('content').value
            const msg = document.getElementById('msg')

            if (!title ||!content) {
                msg.textContent = 'Title and content required'
                return
            }

            const { error } = await supabase.from('articles').insert({
                title,
                content,
                user_id: user.id,
                author_id: user.id,
                author_email: user.email,
                author_name: user.user_metadata?.full_name || user.email.split('@')[0]
            })

            if (error) {
                msg.textContent = `Error: ${error.message}`
            } else {
                msg.textContent = 'Published!'
                document.getElementById('title').value = ''
                document.getElementById('content').value = ''
                await loadArticles()
            }
        })
    </script>
    <style>
        .likeBtn.liked { color: #e0245e; }
        .actions button, .actions a { margin-right: 12px; }
    </style>
</body>
        </html>
