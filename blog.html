<!DOCTYPE html>
<html>
<head>
    <title>Blog - CEM Hub</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <main>
        <div class="blog-header">
            <h1>Latest Articles</h1>
            <a id="postBtn" class="hidden" href="post-article.html">
                <button>Post Article</button>
            </a>
        </div>

        <div id="categoryFilter" class="category-filter">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="CEM Hub Stories">CEM Hub Stories</button>
            <button class="filter-btn" data-category="Tech Meets">Tech Meets</button>
            <button class="filter-btn" data-category="Materials">Materials</button>
            <button class="filter-btn" data-category="Business">Business</button>
            <button class="filter-btn" data-category="Lifestyle">Lifestyle</button>
        </div>

        <div id="articles">Loading articles...</div>
    </main>

    <script type="module">
    import { supabase } from './js/supabase.js'
    import { initLayout } from './js/layout.js'

    const user = await initLayout()
    const articlesDiv = document.getElementById('articles')
    const postBtn = document.getElementById('postBtn')
    let currentCategory = 'all'

    if (user) postBtn.classList.remove('hidden')

    // Category filter clicks
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
            btn.classList.add('active')
            currentCategory = btn.dataset.category
            loadArticles()
        })
    })

    async function loadArticles() {
        let query = supabase
        .from('articles')
        .select('*')
        .order('created_at', { ascending: false })

        if (currentCategory !== 'all') {
            query = query.eq('category', currentCategory)
        }

        const { data: articles, error } = await query

        if (error) {
            articlesDiv.innerHTML = '<p>Error loading articles</p>'
            return
        }

        if (!articles || articles.length === 0) {
            articlesDiv.innerHTML = `<p>No articles in ${currentCategory === 'all'? 'any category' : currentCategory} yet.</p>`
            return
        }

        articlesDiv.innerHTML = articles.map(article => `
            <div class="article-card">
                ${article.cover_image_url? `
                    <div class="article-cover">
                        <img src="${article.cover_image_url}" alt="${article.title}">
                    </div>
                ` : ''}
                <div class="article-content">
                    ${article.category? `<span class="category-badge">${article.category}</span>` : ''}
                    <h3><a href="article.html?id=${article.id}">${article.title}</a></h3>
                    <div class="meta">
                        By <a href="profile.html?user=${article.author_id}">${article.author_name || article.author_email}</a> • 
                        Posted ${new Date(article.created_at).toLocaleDateString()}
                    </div>
                    ${article.excerpt? `<p class="excerpt">${article.excerpt}</p>` : ''}
                </div>
            </div>
        `).join('')
    }

    loadArticles()
    </script>
</body>
                </html>
