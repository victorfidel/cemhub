<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEM Hub</title>
    
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <nav>
        <h1>CEM Hub</h1>
        <div>
            <span id="userEmail"></span>
            <button id="loginBtn">Login</button>
            <button id="logoutBtn" class="hidden">Logout</button>
        </div>
    </nav>
    
    <div id="postForm" class="hidden">
        <h2>New Post</h2>
        <input type="text" id="title" placeholder="Article title" required>
        <textarea id="content" placeholder="Write your article..." required></textarea>
        <button id="postBtn">Publish Article</button>
        <div id="msg"></div>
    </div>
    
    <div id="feed">
        <h2>Latest Articles</h2>
        <div id="articles">Loading...</div>
    </div>

    <script type="module" src="./js/blog.js"></script>
</body>
</html>
