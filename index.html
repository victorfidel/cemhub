<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEM Hub</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        button { padding: 10px 20px; cursor: pointer; }
        .hidden { display: none; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        textarea { height: 120px; }
        .article { border: 1px solid #ddd; padding: 15px; margin: 15px 0; border-radius: 8px; }
        .article h3 { margin: 0 0 10px 0; }
        .meta { font-size: 12px; color: #666; }
        #postForm { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        #msg { margin-top: 10px; }
    </style>
</head>
<body>
    <nav>
        <h1>CEM Hub</h1>
        <div>
            <span id="userEmail"></span>
            <button id="loginBtn">Login</button>
            <button id="logoutBtn" class="hidden">Logout</button>
        </div>
    </nav>
    
    <div id="postForm" class="hidden">
        <h2>New Post</h2>
        <input type="text" id="title" placeholder="Article title" required>
        <textarea id="content" placeholder="Write your article..." required></textarea>
        <button id="postBtn">Publish Article</button>
        <div id="msg"></div>
    </div>
    
    <div id="feed">
        <h2>Latest Articles</h2>
        <div id="articles">Loading...</div>
    </div>

    <script type="module" src="./js/blog.js"></script>
</body>
</html>
